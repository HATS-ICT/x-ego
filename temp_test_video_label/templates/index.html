<!DOCTYPE html>
<html>
<head>
    <title>X-EGO Video Label Alignment Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; display: flex; flex-direction: column; align-items: center; background: #121212; color: white;}
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
        select, button { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; cursor: pointer;}
        button:hover { background: #444; }
        video { max-width: 1000px; border: 2px solid #555; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .info-panel { margin-top: 20px; padding: 20px; background: #222; border-radius: 8px; width: 1000px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px;}
        .header-info { display: flex; gap: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .label-data { margin-top: 10px; font-family: monospace; white-space: pre-wrap; background: #000; padding: 15px; border-radius: 4px; font-size: 1.1em; color: #4CAF50;}
        .status { color: #aaa; font-size: 0.9em; margin-top: 5px; }
        .kb-shortcuts { margin-top: 15px; font-size: 0.8em; color: #888; }
        .segment-item { background: #222; padding: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #444; font-size: 0.9em; font-family: monospace; display: flex; flex-direction: column; gap: 8px; }
        .segment-item:hover { background: #333; border-color: #4CAF50; }
        .player-controls { width: 1000px; background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; border: 1px solid #444; }
        #timeline-wrapper { width: 100%; position: relative; height: 30px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #555; cursor: pointer; }
        #markers-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #playhead { position: absolute; left: 0%; top: 0; bottom: 0; width: 2px; background: red; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <h2>X-EGO Alignment Verifier</h2>
    
    <div class="controls">
        <select id="map-select"><option value="">-- Select Map --</option></select>
        <select id="video-select" style="max-width: 400px;"><option value="">-- Select Video --</option></select>
        <select id="task-select" disabled><option value="">-- Select Task --</option></select>
        <button type="button" id="load-btn">Load Data</button>
        <button type="button" id="next-video-btn" style="background: #2196F3;">Next Video & Load</button>
        <button type="button" id="random-video-btn" style="background: #FF9800;">Next Random Video & Load</button>
    </div>
    
    <video id="video-player" preload="auto" style="display: block; width: 1000px;"></video>
    
    <div class="player-controls">
        <div id="timeline-wrapper">
            <div id="markers-container"></div>
            <div id="playhead"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; gap: 10px;">
                <button type="button" id="play-pause" style="width: 60px;">Play</button>
                <button type="button" id="prev-frame">-1 Frame</button>
                <button type="button" id="next-frame">+1 Frame</button>
            </div>
            <div style="font-family: monospace; font-size: 1.1em;">
                <span id="time-display">0.000 / 0.000</span>
            </div>
            <div>
                FPS: <input type="number" id="fps-input" value="30" style="width: 50px; background: #333; color: white; border: 1px solid #444; padding: 4px;">
            </div>
        </div>
    </div>
    
    <div class="info-panel">
        <div class="header-info">
            <div><strong>Map:</strong> <span id="v-map">-</span></div>
            <div><strong>Offset:</strong> <span id="v-offset">0.000</span>s</div>
            <div><strong>Video Time:</strong> <span id="v-time">0.000</span>s</div>
            <div><strong>Game Time:</strong> <span id="g-time">0.000</span>s</div>
            <div><strong>Tick (64TPS):</strong> <span id="v-tick">0</span></div>
        </div>
        <div class="status" id="status-msg">Ready.</div>
        <div>
            <h3 style="margin: 10px 0 5px 0;">Current Labels</h3>
            <div class="label-data" id="label-display">No label data loaded.</div>
        </div>
    </div>
    
    <div class="info-panel" style="margin-top: 20px;">
        <h3 style="margin: 0 0 10px 0;">All Label Segments (Click to Seek)</h3>
        <div id="segment-list" style="max-height: 250px; overflow-y: auto; background: #111; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 5px;">
            <div style="color: #666; font-style: italic;">No segments loaded.</div>
        </div>
    </div>
    
    <div class="kb-shortcuts">
        Shortcuts: Left/Right Arrow = Step Frame | Space = Play/Pause
    </div>

    <script>
        const mapSelect = document.getElementById('map-select');
        const videoSelect = document.getElementById('video-select');
        const taskSelect = document.getElementById('task-select');
        const loadBtn = document.getElementById('load-btn');
        const nextVideoBtn = document.getElementById('next-video-btn');
        const randomVideoBtn = document.getElementById('random-video-btn');
        const video = document.getElementById('video-player');
        const prevBtn = document.getElementById('prev-frame');
        const playBtn = document.getElementById('play-pause');
        const nextBtn = document.getElementById('next-frame');
        const fpsInput = document.getElementById('fps-input');
        
        const vTime = document.getElementById('v-time');
        const gTime = document.getElementById('g-time');
        const vOffset = document.getElementById('v-offset');
        const vMap = document.getElementById('v-map');
        const vTick = document.getElementById('v-tick');
        const labelDisplay = document.getElementById('label-display');
        const statusMsg = document.getElementById('status-msg');
        const timelineWrapper = document.getElementById('timeline-wrapper');
        const markersContainer = document.getElementById('markers-container');
        const playhead = document.getElementById('playhead');
        const timeDisplay = document.getElementById('time-display');
        const segmentList = document.getElementById('segment-list');

        let currentRecords = [];
        let currentOffset = 0.0;
        let currentMap = "";
        let videoDuration = 0;
        let currentTaskIsSnapshot = false;
        let outOfBoundsRecordsDropped = 0;
        let apiLabelCounts = {};
        let droppedLabelCounts = {};
        let pendingSeekIdx = null;
        let lastRandomLabelByTask = {};
        const primaryLabelFields = new Set([
            "Locations",
            "Location",
            "POV Dies",
            "POV Kills",
            "Any Kill",
            "Planted",
            "Site",
            "Will Plant",
            "Outcome",
            "Winner",
            "Reason",
            "Direction",
            "Alive Count",
        ]);

        function isRecordActiveAtTime(record, timeSec) {
            if (record.has_prediction_tick) {
                const eventToleranceSec = 0.25;
                if (Math.abs(timeSec - record.video_prediction) <= eventToleranceSec) {
                    return true;
                }
            }
            return timeSec >= record.video_start && timeSec <= record.video_end;
        }

        function isRecordWithinVideoBounds(record) {
            if (!Number.isFinite(videoDuration) || videoDuration <= 0) return true;

            const toleranceSec = 0.05;
            const segmentInBounds = record.video_start >= -toleranceSec
                && record.video_end <= videoDuration + toleranceSec;
            const predictionInBounds = !record.has_prediction_tick
                || (record.video_prediction >= -toleranceSec
                    && record.video_prediction <= videoDuration + toleranceSec);

            return segmentInBounds && predictionInBounds;
        }

        function filterRecordsToVideoBounds() {
            if (!Number.isFinite(videoDuration) || videoDuration <= 0 || currentRecords.length === 0) {
                return;
            }

            const before = currentRecords.length;
            const keptRecords = [];
            const droppedRecords = [];
            currentRecords.forEach(record => {
                if (isRecordWithinVideoBounds(record)) {
                    keptRecords.push(record);
                } else {
                    droppedRecords.push(record);
                }
            });

            currentRecords = keptRecords;
            outOfBoundsRecordsDropped += before - currentRecords.length;
            droppedRecords.forEach(record => {
                getRecordLabelKeys(record).forEach(labelKey => {
                    droppedLabelCounts[labelKey] = (droppedLabelCounts[labelKey] || 0) + 1;
                });
            });
        }

        function getRecordLabelKeys(record) {
            if (!record || !record.labels) return [];
            return Object.entries(record.labels)
                .filter(([key, value]) => primaryLabelFields.has(key)
                    && !Array.isArray(value)
                    && value !== null
                    && typeof value !== 'object')
                .map(([key, value]) => `${key}: ${value}`);
        }

        function countVisibleLabels() {
            const counts = {};
            currentRecords.forEach(record => {
                getRecordLabelKeys(record).forEach(labelKey => {
                    counts[labelKey] = (counts[labelKey] || 0) + 1;
                });
            });
            return counts;
        }

        function formatCounts(counts) {
            const entries = Object.entries(counts || {});
            if (entries.length === 0) return "none";
            return entries
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([key, value]) => `${key}=${value}`)
                .join(", ");
        }

        function updateLoadedStatus() {
            let message = `Loaded ${currentRecords.length} label records successfully.`;
            message += ` API labels: ${formatCounts(apiLabelCounts)}.`;
            message += ` Visible labels: ${formatCounts(countVisibleLabels())}.`;
            if (outOfBoundsRecordsDropped > 0) {
                message += ` Hidden ${outOfBoundsRecordsDropped} out-of-bounds records: ${formatCounts(droppedLabelCounts)}.`;
            }
            statusMsg.textContent = message;
        }

        function selectVideoAndAutoLoad(nextIndex) {
            if (nextIndex <= 0 || nextIndex >= videoSelect.options.length) {
                return false;
            }
            videoSelect.selectedIndex = nextIndex;
            window._autoLoadPending = true;
            videoSelect.dispatchEvent(new Event('change'));
            return true;
        }

        function selectVideoValueAndAutoLoad(videoValue) {
            for (let i = 1; i < videoSelect.options.length; i++) {
                if (videoSelect.options[i].value === videoValue) {
                    videoSelect.selectedIndex = i;
                    window._autoLoadPending = true;
                    videoSelect.dispatchEvent(new Event('change'));
                    return true;
                }
            }
            return false;
        }

        function seekToPendingRecord() {
            if (pendingSeekIdx === null || currentRecords.length === 0) return;
            if (!Number.isFinite(videoDuration) || videoDuration <= 0) return;

            const record = currentRecords.find(r => Number(r.idx) === Number(pendingSeekIdx));
            if (!record) {
                statusMsg.textContent = `Loaded data, but sampled label idx ${pendingSeekIdx} is not visible for this video.`;
                pendingSeekIdx = null;
                return;
            }

            const seekTime = record.has_prediction_tick ? record.video_prediction : record.video_start;
            video.currentTime = Math.max(0, Math.min(videoDuration, seekTime));
            pendingSeekIdx = null;
            updateUI();
        }

        function resetLoadedState(message) {
            currentRecords = [];
            currentOffset = 0.0;
            currentMap = "";
            currentTaskIsSnapshot = false;
            outOfBoundsRecordsDropped = 0;
            apiLabelCounts = {};
            droppedLabelCounts = {};
            video.pause();
            video.removeAttribute('src');
            videoDuration = 0;
            vMap.textContent = "-";
            vOffset.textContent = "0.000";
            vTime.textContent = "0.000";
            gTime.textContent = "0.000";
            vTick.textContent = "0";
            timeDisplay.textContent = "0.000 / 0.000";
            labelDisplay.textContent = "No label data loaded.";
            renderMarkers();
            statusMsg.textContent = message;
        }

        function populateTasks(mapName) {
            const previousTask = taskSelect.value;
            taskSelect.disabled = true;
            taskSelect.innerHTML = '<option value="">-- Select Task --</option>';
            if (!mapName) return Promise.resolve([]);

            return fetch(`/api/tasks?map=${encodeURIComponent(mapName)}`)
                .then(r => r.json())
                .then(tasks => {
                    tasks.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t;
                        opt.textContent = t;
                        taskSelect.appendChild(opt);
                    });
                    if (tasks.includes(previousTask)) {
                        taskSelect.value = previousTask;
                    } else if (tasks.length > 0) {
                        taskSelect.selectedIndex = 1;
                    }
                    taskSelect.disabled = false;
                    return tasks;
                });
        }

        function populateVideos(mapName) {
            videoSelect.innerHTML = '<option value="">-- Select Video --</option>';
            if (!mapName) {
                resetLoadedState("Select a map.");
                return Promise.resolve([]);
            }

            statusMsg.textContent = `Fetching ${mapName} videos...`;
            return fetch(`/api/videos?map=${encodeURIComponent(mapName)}`).then(r => r.json()).then(videos => {
                videos.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v;
                    opt.textContent = v;
                    videoSelect.appendChild(opt);
                });
                if (videos.length === 0) {
                    statusMsg.textContent = `No videos found for ${mapName} in temp_test_video_label/data`;
                } else {
                    statusMsg.textContent = `Ready. Found ${videos.length} videos for ${mapName}.`;
                }
                return videos;
            });
        }

        // Fetch maps
        fetch('/api/maps').then(r => r.json()).then(maps => {
            maps.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                mapSelect.appendChild(opt);
            });

            if (maps.length === 0) {
                statusMsg.textContent = "No maps found in temp_test_video_label/data";
            } else {
                mapSelect.selectedIndex = 1;
                mapSelect.dispatchEvent(new Event('change'));
            }
        });

        mapSelect.addEventListener('change', () => {
            const mapName = mapSelect.value;
            resetLoadedState(mapName ? `Loading ${mapName}...` : "Select a map.");
            currentMap = mapName;
            vMap.textContent = mapName || "-";

            Promise.all([populateVideos(mapName), populateTasks(mapName)]).then(([videos, tasks]) => {
                if (!mapName) return;
                statusMsg.textContent = `Ready. Found ${videos.length} videos and ${tasks.length} tasks for ${mapName}.`;
            });
        });

        // When video changes, verify its map and keep tasks synced.
        videoSelect.addEventListener('change', () => {
            const vid = videoSelect.value;
            currentRecords = [];
            currentOffset = 0.0;
            currentTaskIsSnapshot = false;
            outOfBoundsRecordsDropped = 0;
            apiLabelCounts = {};
            droppedLabelCounts = {};
            video.pause();
            video.removeAttribute('src');
            videoDuration = 0;
            vOffset.textContent = "0.000";
            vTime.textContent = "0.000";
            gTime.textContent = "0.000";
            vTick.textContent = "0";
            timeDisplay.textContent = "0.000 / 0.000";
            labelDisplay.textContent = "No label data loaded.";
            renderMarkers();
            if (!vid) {
                statusMsg.textContent = "Select a video.";
                return;
            }
            
            statusMsg.textContent = "Fetching map info...";
            fetch(`/api/video_info?video=${encodeURIComponent(vid)}`)
                .then(r => r.json())
                .then(info => {
                    if (info.map) {
                        currentMap = info.map;
                        vMap.textContent = currentMap;
                        if (mapSelect.value !== currentMap) {
                            mapSelect.value = currentMap;
                        }

                        statusMsg.textContent = `Ready. Video map is ${currentMap}.`;
                        if (window._autoLoadPending) {
                            window._autoLoadPending = false;
                            if (taskSelect.value) {
                                loadBtn.click();
                            }
                        }
                    } else {
                        statusMsg.textContent = "Error: Could not determine map for video.";
                    }
                });
        });

        nextVideoBtn.addEventListener('click', () => {
            let nextIndex = videoSelect.selectedIndex + 1;
            // Skip the placeholder option if we are at the end
            if (!selectVideoAndAutoLoad(nextIndex)) {
                statusMsg.textContent = "Already at the last video.";
            }
        });

        randomVideoBtn.addEventListener('click', () => {
            const mapName = mapSelect.value;
            const task = taskSelect.value;
            if (!mapName || !task) {
                statusMsg.textContent = "Select a map and task first.";
                return;
            }

            statusMsg.textContent = "Selecting a random labeled segment...";
            const params = new URLSearchParams({
                map: mapName,
                task,
                current_video: videoSelect.value || "",
            });
            const labelKey = `${mapName}:${task}`;
            if (lastRandomLabelByTask[labelKey] === 0 || lastRandomLabelByTask[labelKey] === 1) {
                params.set("label", String(1 - lastRandomLabelByTask[labelKey]));
            }
            fetch(`/api/random_labeled_video?${params.toString()}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        statusMsg.textContent = `Error: ${data.error}`;
                        return;
                    }
                    if (data.label === 0 || data.label === 1) {
                        lastRandomLabelByTask[labelKey] = data.label;
                    }
                    pendingSeekIdx = data.idx;
                    if (!selectVideoValueAndAutoLoad(data.video)) {
                        pendingSeekIdx = null;
                        statusMsg.textContent = `Error: sampled video is not in the video list: ${data.video}`;
                    }
                })
                .catch(error => {
                    pendingSeekIdx = null;
                    statusMsg.textContent = `Error selecting random label: ${error.message}`;
                });
        });

        loadBtn.addEventListener('click', () => {
            const vid = videoSelect.value;
            const task = taskSelect.value;
            if (!vid || !task) return;

            statusMsg.textContent = "Loading data...";
            video.src = `/video/${vid}`;
            video.load();

            fetch(`/api/label_data?video=${encodeURIComponent(vid)}&task=${encodeURIComponent(task)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        statusMsg.textContent = `Error: ${data.error}`;
                        currentRecords = [];
                        labelDisplay.textContent = "Error loading data.";
                        renderMarkers();
                        return;
                    }
                    currentRecords = data.records;
                    apiLabelCounts = data.label_counts || {};
                    currentOffset = data.offset_sec;
                    currentTaskIsSnapshot = currentRecords.some(r => r.is_snapshot);
                    outOfBoundsRecordsDropped = 0;
                    droppedLabelCounts = {};
                    filterRecordsToVideoBounds();
                    vOffset.textContent = currentOffset.toFixed(3);
                    updateLoadedStatus();
                    renderMarkers();
                    updateUI();
                    seekToPendingRecord();
                })
                .catch(error => {
                    currentRecords = [];
                    pendingSeekIdx = null;
                    labelDisplay.textContent = "Error loading data.";
                    statusMsg.textContent = `Error loading label data: ${error.message}`;
                    renderMarkers();
                });
        });

        video.addEventListener('loadedmetadata', () => {
            videoDuration = video.duration;
            filterRecordsToVideoBounds();
            if (currentRecords.length > 0 || outOfBoundsRecordsDropped > 0) {
                updateLoadedStatus();
            }
            renderMarkers();
            updateUI();
            seekToPendingRecord();
        });

        video.addEventListener('play', () => playBtn.textContent = 'Pause');
        video.addEventListener('pause', () => playBtn.textContent = 'Play');

        let isDragging = false;
        function updateTimelineScrub(e) {
            if (!videoDuration) return;
            const rect = timelineWrapper.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            video.currentTime = pos * videoDuration;
        }

        timelineWrapper.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateTimelineScrub(e);
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) updateTimelineScrub(e);
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function renderMarkers() {
            markersContainer.innerHTML = '';
            segmentList.innerHTML = '';
            
            if (!videoDuration || currentRecords.length === 0) {
                segmentList.innerHTML = '<div style="color: #666; font-style: italic;">No segments loaded.</div>';
                return;
            }

            function addPredictionMarker(record, idx) {
                if (!record.has_prediction_tick) return;

                const predictionPct = (record.video_prediction / videoDuration) * 100;
                if (!Number.isFinite(predictionPct) || predictionPct < 0 || predictionPct > 100) return;

                const predictionMarker = document.createElement('div');
                predictionMarker.style.position = 'absolute';
                predictionMarker.style.left = predictionPct + '%';
                predictionMarker.style.width = '3px';
                predictionMarker.style.height = '100%';
                predictionMarker.style.backgroundColor = '#FFC107';
                predictionMarker.style.pointerEvents = 'none';
                predictionMarker.style.zIndex = '2';
                predictionMarker.title = `Prediction ${idx+1}: ${record.video_prediction.toFixed(2)}s`;
                markersContainer.appendChild(predictionMarker);
            }

            currentRecords.forEach((r, idx) => {
                if (r.is_snapshot) {
                    const startPct = (r.video_start / videoDuration) * 100;
                    const widthPct = ((r.video_end - r.video_start) / videoDuration) * 100;

                    const windowMarker = document.createElement('div');
                    windowMarker.style.position = 'absolute';
                    windowMarker.style.left = startPct + '%';
                    windowMarker.style.width = widthPct + '%';
                    windowMarker.style.height = '100%';
                    windowMarker.style.backgroundColor = 'rgba(76, 175, 80, 0.35)';
                    windowMarker.style.borderLeft = '1px solid #4CAF50';
                    windowMarker.style.borderRight = '1px solid #4CAF50';
                    windowMarker.style.pointerEvents = 'none';
                    windowMarker.title = `Segment ${idx+1}: ${r.video_start.toFixed(2)}s - ${r.video_end.toFixed(2)}s`;
                    markersContainer.appendChild(windowMarker);
                } else {
                    const marker = document.createElement('div');
                    marker.style.position = 'absolute';
                    const startPct = (r.video_start / videoDuration) * 100;
                    const widthPct = ((r.video_end - r.video_start) / videoDuration) * 100;
                    marker.style.left = startPct + '%';
                    marker.style.width = widthPct + '%';
                    marker.style.height = '100%';
                    marker.style.backgroundColor = 'rgba(76, 175, 80, 0.7)';
                    marker.style.borderLeft = '1px solid #4CAF50';
                    marker.style.borderRight = '1px solid #4CAF50';
                    marker.style.pointerEvents = 'none';
                    marker.title = `Segment ${idx+1}: ${r.video_start.toFixed(2)}s - ${r.video_end.toFixed(2)}s`;
                    markersContainer.appendChild(marker);
                }
                addPredictionMarker(r, idx);

                // Segment list item
                const item = document.createElement('div');
                item.className = 'segment-item';
                const segmentHeader = r.is_snapshot
                    ? `[${r.video_prediction.toFixed(2)}s]`
                    : `[${r.video_start.toFixed(2)}s - ${r.video_end.toFixed(2)}s]`;
                const gameHeader = r.is_snapshot
                    ? `(Game snapshot: ${r.game_prediction.toFixed(2)}s)`
                    : `(Game: ${r.game_start.toFixed(2)}s - ${r.game_end.toFixed(2)}s)`;
                const timingDetails = r.is_snapshot
                    ? `<span><b style="color: #cc7a00;">video_window:</b> ${r.video_start.toFixed(2)}s - ${r.video_end.toFixed(2)}s</span>
                        <span><b style="color: #cc7a00;">game_window:</b> ${r.game_start.toFixed(2)}s - ${r.game_end.toFixed(2)}s</span>`
                    : '';
                item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 4px;">
                        <strong style="color: #4CAF50;">${segmentHeader}</strong>
                        <span style="color:#aaa;">${gameHeader}</span>
                    </div>
                    <div style="color: #ff9800; font-size: 0.85em; display: flex; flex-wrap: wrap; gap: 10px;">
                        <span><b style="color: #cc7a00;">idx:</b> ${r.idx}</span>
                        <span><b style="color: #cc7a00;">partition:</b> ${r.partition}</span>
                        <span><b style="color: #cc7a00;">start_tick:</b> ${r.start_tick}</span>
                        <span><b style="color: #cc7a00;">end_tick:</b> ${r.end_tick}</span>
                        <span><b style="color: #cc7a00;">prediction_tick:</b> ${r.prediction_tick}</span>
                        <span><b style="color: #cc7a00;">start_tick_norm:</b> ${r.start_tick_norm}</span>
                        <span><b style="color: #cc7a00;">end_tick_norm:</b> ${r.end_tick_norm}</span>
                        <span><b style="color: #cc7a00;">prediction_tick_norm:</b> ${r.prediction_tick_norm}</span>
                        ${timingDetails}
                        <span><b style="color: #cc7a00;">match_id:</b> ${r.match_id}</span>
                        <span><b style="color: #cc7a00;">round_num:</b> ${r.round_num}</span>
                        <span><b style="color: #cc7a00;">pov_steamid:</b> ${r.pov_steamid}</span>
                    </div>
                    <div style="color: #ddd; background: #1a1a1a; padding: 6px; border-radius: 4px;">
                        <b style="color: #888;">Labels:</b> ${JSON.stringify(r.labels)}
                    </div>
                `;
                item.addEventListener('click', () => {
                    video.currentTime = r.has_prediction_tick ? r.video_prediction : r.video_start;
                    if (video.paused) video.play();
                });
                segmentList.appendChild(item);
            });
        }

        video.addEventListener('timeupdate', updateUI);

        function updateUI() {
            const t = video.currentTime;
            vTime.textContent = t.toFixed(3);
            const gT = t - currentOffset;
            gTime.textContent = gT.toFixed(3);
            
            // Calculate tick starting from 0, 64 ticks per second
            const tick = Math.max(0, Math.floor(gT * 64));
            vTick.textContent = tick;

            if (videoDuration) {
                playhead.style.left = ((t / videoDuration) * 100) + '%';
                timeDisplay.textContent = `${t.toFixed(3)} / ${videoDuration.toFixed(3)}`;
            }

            if (currentRecords.length === 0) {
                return;
            }

            // Find active record
            let active = null;
            for (let r of currentRecords) {
                if (isRecordActiveAtTime(r, t)) {
                    active = r;
                    break;
                }
            }

            if (active) {
                labelDisplay.innerHTML = JSON.stringify(active.labels, null, 2);
                if (active.is_snapshot) {
                    statusMsg.textContent = `Snapshot label shown for window ${active.video_start.toFixed(3)}s-${active.video_end.toFixed(3)}s; prediction tick at ${active.video_prediction.toFixed(3)}s (game ${active.game_prediction.toFixed(3)}s).`;
                }
            } else {
                labelDisplay.textContent = currentTaskIsSnapshot
                    ? "No snapshot label active at this exact timestamp."
                    : "No label active at this exact timestamp.";
            }
        }

        prevBtn.addEventListener('click', () => {
            const fps = parseFloat(fpsInput.value) || 30;
            video.currentTime = Math.max(0, video.currentTime - (1/fps));
        });

        nextBtn.addEventListener('click', () => {
            const fps = parseFloat(fpsInput.value) || 30;
            video.currentTime = Math.min(video.duration, video.currentTime + (1/fps));
        });

        playBtn.addEventListener('click', () => {
            if (video.paused) video.play();
            else video.pause();
        });
        
        document.addEventListener('keydown', (e) => {
            // Ignore if typing in input
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'ArrowLeft') {
                prevBtn.click();
            } else if (e.key === 'ArrowRight') {
                nextBtn.click();
            } else if (e.key === ' ') {
                playBtn.click();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
